name: Auto Generate Sitemap

on:
  push:
    branches: [ main ]

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url><loc>https://aigc.jogiter.cn/</loc><lastmod>'$(date +%Y-%m-%d)'</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>' >> sitemap.xml
          for file in *.html; do
            if [ "$file" != "index.html" ]; then
              slug="${file%.html}"
              echo '  <url><loc>https://aigc.jogiter.cn/'$file'</loc><lastmod>'$(date +%Y-%m-%d)'</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>' >> sitemap.xml
            fi
          done
          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore: auto update sitemap.xml" --allow-empty || echo "No changes to sitemap"
          git push
